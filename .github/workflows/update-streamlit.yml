name: Update Streamlit Cloud Configuration

on:
  workflow_dispatch:  # 手动触发
  push:
    paths:
      - 'ielts_coach_stable.py'
      - 'database_v4_fixed.py'

jobs:
  update-streamlit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create configuration update script
      run: |
        cat > update_config.py << 'EOF'
        #!/usr/bin/env python3
        """
        更新Streamlit Cloud配置的脚本
        通过修改README触发Streamlit Cloud重新部署
        """
        
        import os
        import sys
        import datetime
        
        def update_readme():
            """更新README文件，触发Streamlit Cloud重新部署"""
            readme_path = "README.md"
            
            # 读取现有README
            if os.path.exists(readme_path):
                with open(readme_path, 'r', encoding='utf-8') as f:
                    content = f.read()
            else:
                content = "# IELTS Coach - 稳定资源版\n\n"
            
            # 添加更新时间戳
            timestamp = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
            update_section = f"\n\n## 🚀 配置更新\n\n最后配置更新时间: {timestamp}\n\n**主文件已更新为**: `ielts_coach_stable.py`\n\n### 🛡️ 稳定资源保障\n- ✅ 雅思官方资源 (永久有效)\n- ✅ British Council (官方机构)\n- ✅ Cambridge English (权威平台)\n- 🌐 所有资源国内可访问\n- 🔄 几乎不会过期\n"
            
            # 确保更新部分在文件末尾
            if "## 🚀 配置更新" in content:
                # 替换现有更新部分
                lines = content.split('\n')
                new_lines = []
                in_update_section = False
                for line in lines:
                    if line.strip() == "## 🚀 配置更新":
                        in_update_section = True
                        new_lines.append(line)
                    elif in_update_section and line.strip().startswith("## "):
                        in_update_section = False
                        new_lines.append(update_section.strip())
                        new_lines.append(line)
                    elif not in_update_section:
                        new_lines.append(line)
                
                if in_update_section:
                    new_lines.append(update_section.strip())
                
                new_content = '\n'.join(new_lines)
            else:
                new_content = content + update_section
            
            # 写入更新后的README
            with open(readme_path, 'w', encoding='utf-8') as f:
                f.write(new_content)
            
            print(f"✅ README已更新，时间戳: {timestamp}")
            return True
        
        def create_deployment_guide():
            """创建部署指南"""
            guide = """# 🚀 Streamlit Cloud 部署指南

## 主文件配置
**必须设置主文件为**: `ielts_coach_stable.py`

## 稳定资源版特点
1. 🏛️ **雅思官方资源** - 永久有效
2. 🇬🇧 **British Council** - 官方机构
3. 🎓 **Cambridge English** - 权威平台
4. 🌐 **国内可访问** - 无需科学上网
5. 🔄 **不会过期** - 链接永久有效

## 部署步骤
1. 登录 [Streamlit Cloud](https://streamlit.io/cloud)
2. 选择 `robinszabeeba-maker/ielts-coach` 仓库
3. 设置 **Main file path** 为: `ielts_coach_stable.py`
4. 点击 **Deploy**
5. 等待部署完成

## 验证部署
部署完成后访问:
https://ielts-coach-robinszabeeba-maker.streamlit.app

## 问题排查
如果部署失败，请检查:
1. 仓库权限是否正确
2. 主文件路径是否正确
3. Python依赖是否满足
"""
            
            with open("DEPLOYMENT_GUIDE.md", 'w', encoding='utf-8') as f:
                f.write(guide)
            
            print("✅ 部署指南已创建")
            return True
        
        if __name__ == "__main__":
            try:
                update_readme()
                create_deployment_guide()
                print("🎉 配置更新脚本执行完成")
                print("📤 提交更改以触发Streamlit Cloud重新部署")
            except Exception as e:
                print(f"❌ 错误: {e}")
                sys.exit(1)
        EOF
        
        python update_config.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md DEPLOYMENT_GUIDE.md
        git commit -m "🔧 更新Streamlit Cloud配置 - 主文件改为ielts_coach_stable.py" || echo "没有更改可提交"
        git push